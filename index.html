<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single Origin Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0E1A2B;
  color: #FFFBF0;
  min-height: 100vh;
  padding: 40px 20px;
}
.container { max-width: 600px; margin: 0 auto; text-align: center; }
h1 { font-size: 36px; margin-bottom: 8px; color: #FFD66B; }
.tagline { color: #aaa; margin-bottom: 40px; font-size: 16px; }
.game {
  background: #1A2336;
  padding: 24px;
  border-radius: 16px;
  margin: 16px 0;
  text-align: left;
}
.game h2 { margin-bottom: 12px; color: #FFFBF0; }
.game p { color: #ccc; margin-bottom: 16px; }
.game a {
  display: inline-block;
  padding: 10px 20px;
  background: #2B7CE9;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
}
.game a:hover { background: #4A9CFA; }
.footer {
  color: #666;
  font-size: 12px;
  margin-top: 60px;
  text-align: center;
}
.footer a { color: #4A9CFA; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🪐 Single Origin Games</h1>
  <p class="tagline">Indie idle games.<br>Making games + sharing the journey.</p>

  <div class="game">
    <h2>Tycoon Era: Idle Money Empire</h2>
    <p>An idle business tycoon with parody tickers and a 6-era arc planned.</p>
    <a href="https://play.google.com/store/apps/details?id=io.github.psinha1980.tycoon_era">Get on Google Play →</a>
  </div>

  <div class="game">
    <h2>Fleet Magnate Transport Tycoon</h2>
    <p>Coming soon.</p>
  </div>

  <p class="footer">
    © 2026 Single Origin Games · <a href="mailto:singleorigingames@gmail.com">Contact</a>
  </p>
</div>
</body>
</html>
